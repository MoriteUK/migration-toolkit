<style>
  html, body { margin: 0; height: 100%; background: #f3f4f7; }
  #root { height: 100vh; }
  *::-webkit-scrollbar { width: 12px; height: 12px; }
  *::-webkit-scrollbar-thumb { background: #c8ccd6; border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
  *::-webkit-scrollbar-thumb:hover { background: #aeb3c0; background-clip: padding-box; border: 3px solid transparent; }
  @keyframes flySlideIn { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
