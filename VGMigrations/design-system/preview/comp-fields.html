<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--font-ui);padding:22px;color:#1c1c20}
  .grid{display:grid;grid-template-columns:auto 1fr;gap:12px 16px;align-items:center;max-width:520px}
  label{font-size:13px}
  input,select{font-family:var(--font-ui);font-size:13px;height:26px;border:1px solid #d2d7e4;background:#fff;padding:0 8px;box-sizing:border-box;width:100%;color:#1c1c20;border-radius:2px}
  input:focus,select:focus{outline:none;border-color:#0064b4}
  .chk{display:flex;align-items:center;gap:8px;grid-column:1/3;font-size:13px}
  .chk input{width:auto;height:auto}
</style>
</head>
<body>
  <div class="grid">
    <label>Fly API URL</label><input value="https://contoso.avepointonline.com">
    <label>Client ID</label><input value="8f3c…-a91b">
    <label>Interval</label>
    <select><option>1 min</option><option>5 min</option><option>15 min</option></select>
    <div class="chk"><input type="checkbox" checked id="a"><label for="a">Auto refresh</label></div>
  </div>
</body>
</html>
