<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--font-ui);padding:18px}
  .row{display:flex;gap:0;border:1px solid #e6e9f0}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-sizing:border-box;border-right:1px solid #e6e9f0}
  .sw:last-child{border-right:0}
  .sw .hex{font-size:11px;font-weight:600;font-family:var(--font-mono)}
  .sw .nm{font-size:10.5px;margin-top:2px;opacity:.8}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#f0f2f7;color:#1c1c20"><span class="hex">#F0F2F7</span><span class="nm">Canvas / bg</span></div>
    <div class="sw" style="background:#ffffff;color:#1c1c20"><span class="hex">#FFFFFF</span><span class="nm">Surface / panel</span></div>
    <div class="sw" style="background:#1c1c20;color:#fff"><span class="hex">#1C1C20</span><span class="nm">Ink / text</span></div>
    <div class="sw" style="background:#646c78;color:#fff"><span class="hex">#646C78</span><span class="nm">Muted text</span></div>
    <div class="sw" style="background:#d2d7e4;color:#1c1c20"><span class="hex">#D2D7E4</span><span class="nm">Hairline border</span></div>
    <div class="sw" style="background:#afb6c3;color:#1c1c20"><span class="hex">#AFB6C3</span><span class="nm">Idle dot grey</span></div>
  </div>
</body>
</html>
