<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--font-ui);padding:20px;color:#1c1c20}
  .scale{display:flex;align-items:flex-end;gap:14px}
  .u{background:#0064b4;border-radius:2px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .item span{font-size:11px;font-family:var(--font-mono);color:#646c78}
</style>
</head>
<body>
  <div class="scale">
    <div class="item"><div class="u" style="width:6px;height:6px"></div><span>6</span></div>
    <div class="item"><div class="u" style="width:8px;height:8px"></div><span>8</span></div>
    <div class="item"><div class="u" style="width:12px;height:12px"></div><span>12</span></div>
    <div class="item"><div class="u" style="width:16px;height:16px"></div><span>16</span></div>
    <div class="item"><div class="u" style="width:26px;height:26px"></div><span>26</span></div>
    <div class="item"><div class="u" style="width:40px;height:40px"></div><span>40</span></div>
  </div>
  <p style="margin:16px 0 0;font-size:11.5px;color:#646c78">Pragmatic whole‑pixel rhythm from the WinForms layout: <b style="color:#1c1c20">6</b> tile gap · <b style="color:#1c1c20">8</b> inset · <b style="color:#1c1c20">12</b> field gap · <b style="color:#1c1c20">16</b> card pad · <b style="color:#1c1c20">26</b> subtitle row · <b style="color:#1c1c20">40</b> dialog margin.</p>
</body>
</html>
