<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--font-ui);padding:20px;color:#1c1c20}
  .stack{display:flex;flex-direction:column;gap:13px}
  .spec{display:flex;align-items:baseline;gap:16px}
  .spec .lbl{width:150px;font-family:var(--font-mono);font-size:11px;color:#646c78;flex:none}
</style>
</head>
<body>
  <div class="stack">
    <div class="spec"><span class="lbl">body · 9pt 400</span><span style="font-size:13px">Manage connections, source/destination accounts and job mappings</span></div>
    <div class="spec"><span class="lbl">bold · 9pt 600</span><span style="font-size:13px;font-weight:600">Connected: contoso.avepointonline.com</span></div>
    <div class="spec"><span class="lbl">sub · 8.5pt muted</span><span style="font-size:12px;color:#646c78">Register the Entra ID app and grant required API permissions</span></div>
    <div class="spec"><span class="lbl">cap · 7.5pt 600</span><span style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#646c78">Source Tenant</span></div>
  </div>
</body>
</html>
