<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--font-ui);padding:18px}
  .console{background:#1a1b26;border-radius:3px;padding:14px 16px;font-family:var(--font-mono);font-size:12.5px;line-height:1.6}
  .ts{color:#505f78}
  .lvl-info{color:#789bdc}.lvl-ok{color:#41c36e}.lvl-warn{color:#dca52d}.lvl-err{color:#e15050}
  .msg{color:#cdd4e6}
</style>
</head>
<body>
  <div class="console">
    <div><span class="ts">14:30:21</span> <span class="lvl-info">[INFO]</span> <span class="msg">Connecting to source tenant…</span></div>
    <div><span class="ts">14:30:24</span> <span class="lvl-ok">[OK]</span> <span class="msg">Connected: contoso.avepointonline.com</span></div>
    <div><span class="ts">14:30:31</span> <span class="lvl-warn">[WARN]</span> <span class="msg">3 mappings finished with exceptions</span></div>
    <div><span class="ts">14:30:42</span> <span class="lvl-err">[ERROR]</span> <span class="msg">SharePoint mapping import failed</span></div>
  </div>
</body>
</html>
