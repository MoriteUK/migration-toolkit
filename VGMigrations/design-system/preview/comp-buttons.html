<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--font-ui);padding:22px;color:#1c1c20}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  button{font-family:var(--font-ui);font-weight:600;font-size:13px;border:0;height:30px;padding:0 18px;cursor:pointer;border-radius:2px;transition:background .12s}
  .pri{background:#0064b4;color:#fff}.pri:hover{background:#004e98}
  .sec{background:#e1e4ee;color:#1c1c20}.sec:hover{background:#d4d8e6}
  .dng{background:#c31e1e;color:#fff}.dng:hover{background:#a81a1a}
  .close{background:#c83737;color:#fff}
  .lbl{font-size:11px;color:#646c78;font-family:var(--font-mono);width:100%;margin-bottom:-4px}
</style>
</head>
<body>
  <span class="lbl">Flat fills · Segoe UI Semibold · hand cursor · darken on hover</span>
  <div class="row">
    <button class="pri">Connect Now</button>
    <button class="sec">Browse…</button>
    <button class="dng">Remove Domain</button>
    <button class="close">Close</button>
  </div>
</body>
</html>
