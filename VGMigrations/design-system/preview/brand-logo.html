<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--font-ui);padding:22px;color:#1c1c20;display:flex;align-items:center;gap:26px}
  .marks{display:flex;align-items:center;gap:18px}
  .marks img{border-radius:14px}
  .on-blue{background:#0064b4;padding:10px;border-radius:14px}
  .on-blue img{border-radius:8px;display:block}
  .txt{font-size:11.5px;color:#646c78;line-height:1.6;max-width:300px}
  .txt b{color:#1c1c20;font-weight:600}
</style>
</head>
<body>
  <div class="marks">
    <img src="../assets/fly-logo-256.png" width="72" height="72" alt="Fly Migration app icon">
    <img src="../assets/fly-logo-64.png" width="36" height="36" alt="Fly Migration small icon">
  </div>
  <div class="txt"><b>FlyMigration</b> — the sole brand mark. A white paper‑plane / arrow flying right on a blue rounded square: migration in motion. Used at the left of every header banner and as the window &amp; taskbar icon.</div>
</body>
</html>
