<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#f0f2f7;font-family:var(--font-ui);padding:18px}
  .win{max-width:560px;background:#f0f2f7;border:1px solid #cfd5e2;border-radius:3px;overflow:hidden}
  .hdr{height:48px;background:#0064b4;display:flex;align-items:center;gap:10px;padding:0 12px}
  .hdr img{width:30px;height:30px;border-radius:5px}
  .hdr .t{color:#fff;font-weight:600;font-size:17px;flex:1}
  .gear{width:30px;height:30px;border-radius:50%;background:#fff;color:#0064b4;display:flex;align-items:center;justify-content:center;font-size:17px}
  .body{height:46px;display:flex;align-items:center;justify-content:center;color:#646c78;font-size:12px}
  .ftr{height:40px;background:#141826;display:flex;align-items:center;justify-content:flex-end;padding:0 10px}
  .ftr button{background:#c83737;color:#fff;border:0;height:26px;padding:0 16px;font-weight:600;font-size:12px;border-radius:2px;font-family:var(--font-ui)}
</style>
</head>
<body>
  <div class="win">
    <div class="hdr"><img src="../assets/fly-logo-64.png" alt=""><span class="t">Migration Toolkit</span><span class="gear">⚙</span></div>
    <div class="body">56px blue banner&nbsp;·&nbsp;content&nbsp;·&nbsp;46px navy footer — the frame on every window</div>
    <div class="ftr"><button>Close</button></div>
  </div>
</body>
</html>
